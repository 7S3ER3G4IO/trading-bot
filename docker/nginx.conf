###############################################################################
# nginx.conf — Reverse Proxy HTTPS pour Grafana NEMESIS
# Usage : dans docker-compose.yml avec service nginx
###############################################################################

events {
    worker_connections 1024;
}

http {
    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS → Grafana ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # Certificat auto-signé (généré au premier démarrage)
        ssl_certificate     /etc/nginx/ssl/nemesis.crt;
        ssl_certificate_key /etc/nginx/ssl/nemesis.key;

        # Paramètres SSL sécurisés
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Headers sécurité
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;

        # ── Grafana ──────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://nemesis_grafana:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 90;
        }

        # ── Prometheus metrics (bot) ──────────────────────────────────────────
        location /metrics {
            proxy_pass         http://nemesis_bot:9090/metrics;
            proxy_set_header   Host $host;
            # Accès restreint (adresse IP admin uniquement)
            # allow 10.0.0.0/8;  # décommenter pour restreindre l'accès
            # deny all;
        }
    }
}
