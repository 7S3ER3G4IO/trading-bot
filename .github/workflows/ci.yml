name: AlphaTrader CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    continue-on-error: true   # Ne bloque pas le déploiement Railway si CI échoue

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install numpy pandas ta python-dotenv loguru ccxt requests

      - name: Create test env
        run: |
          echo "BINANCE_API_KEY=test_key" > .env
          echo "BINANCE_SECRET=test_secret" >> .env
          echo "TELEGRAM_BOT_TOKEN=test_token" >> .env
          echo "TELEGRAM_CHAT_ID=123456789" >> .env

      - name: Syntax check
        run: |
          python -m py_compile strategy.py
          python -m py_compile risk_manager.py
          python -m py_compile daily_reporter.py
          python -m py_compile database.py
          python -m py_compile market_context.py
          python -m py_compile telegram_notifier.py
          python -m py_compile telegram_bot_handler.py
          python -m py_compile config.py
          echo "Syntax check passed"

      - name: Install test deps
        run: pip install pytest mplfinance==0.12.9b7 matplotlib Pillow

      - name: Run tests
        continue-on-error: true   # Les tests peuvent échouer sans clés réelles
        env:
          MPLBACKEND: Agg
        run: pytest tests/ -q --tb=short
