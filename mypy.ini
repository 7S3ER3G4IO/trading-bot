[mypy]
python_version = 3.11
warn_return_any = False
ignore_missing_imports = True
disallow_untyped_defs = False
warn_unused_ignores = True
no_strict_optional = True

# Fichiers critiques — checker strictement
[mypy-risk_manager]
disallow_untyped_defs = True
warn_return_any = True

[mypy-database]
disallow_untyped_defs = True

[mypy-brokers.mt5_client]
disallow_untyped_defs = True

# Fichiers expérimentaux — ignorer
[mypy-research_labs.*]
ignore_errors = True

[mypy-rl_agent]
ignore_errors = True
